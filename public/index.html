<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SNS CONNECT</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Splash Screen -->
  <div id="splashScreen" class="skypeBoot">
    <div class="bootBackgroundGlow bootGlow1"></div>
    <div class="bootBackgroundGlow bootGlow2"></div>
    <div class="bootBackgroundGlow bootGlow3"></div>

    <div class="bootCenterWrap">
      <div class="bootSymbolWrap">
        <div class="bootRing bootRing1"></div>
        <div class="bootRing bootRing2"></div>
        <div class="bootRing bootRing3"></div>

        <div class="bootCore">
          <span class="bootCoreLetter">S</span>
        </div>
      </div>

      <div class="bootBrandReveal">
        <div class="bootAppName">SNS CONNECT</div>
        <div class="bootAppSub">Secure video meetings</div>
      </div>
    </div>
  </div>

  <!-- Join Screen -->
  <div id="joinScreen" class="joinScreen hidden">
    <div class="joinCard">
      <div class="joinBrand">
        <div class="joinBrandIcon">S</div>
        <div>
          <div class="joinLogo">SNS CONNECT</div>
          <div class="joinSubBrand">Meet anytime, anywhere</div>
        </div>
      </div>

      <h2 class="joinHeading">Join a meeting</h2>
      <p class="joinSub">Enter your display name and room ID to continue</p>

      <div class="joinForm">
        <input id="nameInput" type="text" placeholder="Your name" autocomplete="off" />
        <input id="roomInput" type="text" placeholder="Room ID" autocomplete="off" />
        <button id="joinBtn" class="primaryBtn" type="button">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Join now</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Meeting Screen -->
  <div id="meetingScreen" class="meetingScreen hidden">
    <div class="topBar">
      <div class="topBarLeft">
        <div class="menuWrap">
          <button id="menuBtn" class="topIconBtn" title="Menu" type="button" aria-label="Open menu">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div id="menuDropdown" class="menuDropdown hidden">
            <button id="startRecordBtn" class="menuItem" type="button">
              <i class="fa-solid fa-circle-dot"></i>
              <span>Start Recording</span>
            </button>

            <button id="stopRecordBtn" class="menuItem hidden" type="button">
              <i class="fa-solid fa-stop"></i>
              <span>Stop Recording</span>
            </button>

            <button id="screenshotBtn" class="menuItem" type="button">
              <i class="fa-solid fa-camera"></i>
              <span>Take Screenshot</span>
            </button>
          </div>
        </div>

        <div class="meetingInfo">
          <div class="meetingTitle">Meeting with Colleagues</div>
          <div class="meetingMeta">
            <span id="roomPill" class="metaItem"></span>
            <span class="metaDot">|</span>
            <span id="callTimer" class="timer">00:00</span>
            <span class="metaDot">|</span>
            <span id="statusText" class="status">Connecting…</span>
            <span id="recBadge" class="recBadge hidden">
              <span class="recDot"></span>
              REC
            </span>
          </div>
        </div>
      </div>

      <div class="topBarRight">
        <div class="miniSelfPreview">
          <video id="miniLocalVideo" autoplay muted playsinline></video>
        </div>
      </div>
    </div>

    <div class="stage">
      <div class="grid" id="videoArea">
        <div id="toast" class="toast hidden"></div>

        <div id="remoteOverlay" class="overlay">
          <div class="spinner"></div>
          <div class="overlayText">Waiting for participant…</div>
        </div>

        <div id="videoGrid" class="videoGrid">
          <div class="mainVideoArea">
            <div id="mainVideoTile" class="mainVideoTile">
              <video id="mainVideo" autoplay playsinline></video>
              <div id="mainNameTag" class="nameTag">You</div>
            </div>
          </div>

          <div id="thumbStrip" class="thumbStrip"></div>
        </div>
      </div>
    </div>

    <div id="chatPanel" class="chatPanel hidden">
      <div class="chatHeader">
        <div class="chatTitle">Chat</div>
        <button id="chatCloseBtn" class="iconBtn ghost" title="Close chat" type="button" aria-label="Close chat">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div id="chatBox" class="chatBox"></div>

      <div class="chatRow">
        <input id="chatInput" type="text" placeholder="Type a message…" autocomplete="off" />
        <button id="sendBtn" class="iconBtn primary" title="Send" type="button" aria-label="Send message">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <div class="controlBar">
      <button id="muteBtn" class="ctl whiteCtl" title="Mute/Unmute" type="button" aria-label="Mute or unmute microphone">
        <div class="ctlIcon"><i class="fa-solid fa-microphone"></i></div>
      </button>

      <button id="camBtn" class="ctl whiteCtl" title="Start/Stop Video" type="button" aria-label="Turn camera on or off">
        <div class="ctlIcon"><i class="fa-solid fa-video"></i></div>
      </button>

      <button id="switchCamBtn" class="ctl whiteCtl" title="Switch Camera" type="button" aria-label="Switch camera">
        <div class="ctlIcon"><i class="fa-solid fa-rotate"></i></div>
      </button>

      <button id="chatBtn" class="ctl whiteCtl" title="Chat" type="button" aria-label="Open chat">
        <div class="ctlIcon"><i class="fa-regular fa-message"></i></div>
      </button>

      <button id="leaveBtn" class="ctl dangerCtl" title="Leave" type="button" aria-label="Leave meeting">
        <div class="ctlIcon"><i class="fa-solid fa-phone-slash"></i></div>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
